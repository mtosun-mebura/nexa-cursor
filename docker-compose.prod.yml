# Productie / staging: backend + PostgreSQL in Docker.
# DB-credentials en APP_KEY: repo-root .env (bind-mount). Compose zet alleen DB_HOST=db.

include:
  - path: ./docker-compose.postgres.yml

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:8085:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://nexasuite.nl
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"

      N8N_URL: https://n8n.tosun.nl
      N8N_PORT: "5678"
      N8N_EMAIL: m.tosun@mebura.nl

    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
      - ./backend/public/build:/var/www/html/public/build
      - ./.env:/var/www/html/.env
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@fsockopen('127.0.0.1',8000));"]
      interval: 10s
      timeout: 3s
      retries: 10
