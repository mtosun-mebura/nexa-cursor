services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    # Geen container_name: vaste namen zijn globaal uniek en geven conflicten bij
    # meerdere deploy-paden of als 'compose down' niet dezelfde projectnaam gebruikt.
    # Compose gebruikt dan bv. <project>-backend-1; exec: docker compose exec backend …
    ports:
      - "127.0.0.1:8085:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://nexasuite.nl
      # APP_KEY / DB_PASSWORD / N8N_PASSWORD: niet via ${…} hier — lege waarden zouden het gemounte .env overrulen.
      # Zet die sleutels in TENANT_DIR/.env (zelfde bestand als volume hieronder).

      DB_CONNECTION: pgsql
      DB_HOST: 192.168.2.40
      DB_PORT: 5432
      # Standaard als compose .env geen DB_DATABASE zet; Laravel leest verder uit gemount .env.
      DB_DATABASE: ${DB_DATABASE:-nexa-staging}
      DB_USERNAME: mtosun

      N8N_URL: https://n8n.tosun.nl
      N8N_PORT: "5678"
      N8N_EMAIL: m.tosun@mebura.nl

    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
      - ./backend/public/build:/var/www/html/public/build
      # Hostpad moet een bestand zijn (geen map). Ontbrekend pad → soms map .env → runc-mountfout.
      - ./.env:/var/www/html/.env
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "php", "-r", "exit((int)!@fsockopen('127.0.0.1',8000));"]
      interval: 10s
      timeout: 3s
      retries: 10
