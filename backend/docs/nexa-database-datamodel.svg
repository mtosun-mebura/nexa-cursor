  <rect width="2400" height="1600" fill="#f8fafc"/>
  <text x="90" y="86" class="title">Nexa database-datamodel</text>
  <text x="90" y="125" class="subtitle">PostgreSQL: core in public, modules in nexa_taxi en nexa_skillmatching</text>

  <!-- Cross-domain relations -->
