<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1600" viewBox="0 0 2400 1600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 48px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #64748b; }
      .panel-title { font: 700 30px Arial, sans-serif; fill: #ffffff; }
      .panel-subtitle { font: 400 17px Arial, sans-serif; fill: #e2e8f0; }
      .group-title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .table-title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .field { font: 400 14px Arial, sans-serif; fill: #475569; }
      .small { font: 400 15px Arial, sans-serif; fill: #475569; }
      .legend { font: 600 15px Arial, sans-serif; fill: #334155; }
      .relation { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow); }
      .relation-dashed { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 10 8; marker-end: url(#arrow); }
      .table { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
