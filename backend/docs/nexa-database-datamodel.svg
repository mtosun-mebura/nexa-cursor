  <path d="M780 565 C845 565, 830 670, 895 670" class="relation-dashed"/>
  <path d="M780 785 C845 785, 830 865, 895 865" class="relation-dashed"/>
  <path d="M1605 470 C1665 470, 1650 430, 1715 430" class="relation-dashed"/>
  <path d="M1605 595 C1665 595, 1650 655, 1715 655" class="relation-dashed"/>

