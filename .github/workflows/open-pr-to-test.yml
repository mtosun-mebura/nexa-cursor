# Opent automatisch een PR naar release/test bij push op nexa-saas.
# Na merge triggert deploy-saas.yml via push op release/test.

name: Open PR to release/test

on:
  push:
    branches:
      - nexa-saas

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    if: github.ref != 'refs/heads/release/test'
    runs-on: ubuntu-latest
    steps:
      - name: Create or skip PR
        uses: actions/github-script@v7
        with:
          script: |
            const base = 'release/test';
            const head = context.ref.replace('refs/heads/', '');

            const { data: existing } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${head}`,
              base,
            });

            if (existing.length > 0) {
              core.info(`Open PR bestaat al: #${existing[0].number}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy test: ${head} → ${base}`,
              head,
              base,
              body: [
                'Automatisch aangemaakt bij push op `' + head + '`.',
                '',
                'Na groene CI wordt deze PR automatisch gemerged (auto-merge workflow).',
                'Merge naar `release/test` start de TEST-deploy pipeline.',
              ].join('\n'),
            });

            core.info(`PR aangemaakt: #${pr.number}`);
