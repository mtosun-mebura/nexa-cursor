name: Deploy Nexa Taxiroyaal

on:
  push:
    branches:
      - nexa-saas
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Show context
        run: |
          echo "Deploy gestart voor taxiroyaal.nexasuite.nl"
          whoami
          hostname
          pwd

      # Geen `sudo` naar root: in CI is er geen TTY en krijg je een wachtwoordprompt.
      # Opties: (1) runner draait als nexas4479 → direct dit script; (2) runner als andere user
      # → sudoers NOPASSWD voor `sudo -u nexas4479` op dit pad (zie deploy/github-runner-sudoers.example).
      - name: Run server deploy script
        run: |
          sudo /usr/local/bin/deploy-taxiroyaal.sh

      - name: Verify public site
        run: |
          set -e
          code=$(curl -k -sS -o /dev/null -w "%{http_code}" --max-time 30 https://taxiroyaal.nexasuite.nl || echo "000")
          echo "HTTP status: $code"
          if [ "$code" != "200" ] && [ "$code" != "302" ] && [ "$code" != "301" ]; then
            echo "Publieke site geeft onverwachte status: $code"
            exit 1
          fi
          command -v node >/dev/null 2>&1 || { echo "Fout: node niet gevonden"; exit 1; }
          command -v npm >/dev/null 2>&1 || { echo "Fout: npm niet gevonden"; exit 1; }
          command -v docker >/dev/null 2>&1 || { echo "Fout: docker niet gevonden"; exit 1; }