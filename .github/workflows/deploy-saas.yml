name: Deploy SaaS (self-hosted)

on:
  push:
    branches:
      - nexa-saas
  workflow_dispatch:

# App op de host: git + docker in TENANT_DIR (standaard in deploy/deploy-tenant.sh).
jobs:
  deploy:
    runs-on: self-hosted
    env:
      # Unix-user die TENANT_DIR (.git, docker) bezit; override via repo variable als anders.
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      # Optioneel: komma-gescheiden extra users die deploy-tenant direct mogen draaien.
      EXTRA_DEPLOY_USERS: ${{ vars.EXTRA_DEPLOY_USERS }}

    steps:
      - uses: actions/checkout@v4

      # Runner ≠ eigenaar van de app-map → git moet als DEPLOY_USER (standaard mtosun).
      # Geen TTY: sudo -n. Zie deploy/github-runner-sudoers.example.
      - name: Deploy
        run: |
          set -e
          SCRIPT="$GITHUB_WORKSPACE/deploy/deploy-tenant.sh"
          U="$(id -un)"
          TARGET="${DEPLOY_USER:-mtosun}"

          echo "Deploy naar /home/nexasuite.nl/apps/saas/current (user: ${TARGET})"

          if [[ "$U" == "$TARGET" ]] || [[ "$U" == "root" ]]; then
            DEPLOY_USER="$TARGET" bash "$SCRIPT"
          elif sudo -n -u "$TARGET" true 2>/dev/null; then
            echo "==> Runner-user is $U; deploy als $TARGET (passwordless sudo)"
            # Geen `sudo … env … bash`: sudo ziet dan /usr/bin/env als commando — staat niet in NOPASSWD.
            sudo -n -u "$TARGET" bash "$SCRIPT"
          else
            DEPLOY_USER="$TARGET" EXTRA_DEPLOY_USERS="${EXTRA_DEPLOY_USERS:-}" bash "$SCRIPT"
          fi