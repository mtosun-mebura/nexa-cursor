# Schakelt auto-merge pas in nadat Test and Build op de PR succesvol is afgerond.
# Vereist: Settings → Pull Requests → Allow auto-merge
# En ruleset op release/test: required check "Test and Build / test"

name: Auto-merge naar release/test

on:
  workflow_run:
    workflows:
      - Test and Build
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const pullRequests = context.payload.workflow_run.pull_requests || [];
            if (pullRequests.length === 0) {
              core.setFailed('Geen PR gekoppeld aan deze workflow-run.');
              return;
            }
            const pr = pullRequests.find((item) => item.base?.ref === 'release/test') || pullRequests[0];
            core.setOutput('number', String(pr.number));

      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.pr.outputs.number }}
          merge-method: merge
