# Schakelt auto-merge in nadat Test and Build succesvol is afgerond.
# Werkt bij zowel pull_request- als push-runs (PR wordt vaak na push geopend).

name: Auto-merge naar release/test

on:
  workflow_run:
    workflows:
      - Test and Build
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const base = 'release/test';
            const pullRequests = context.payload.workflow_run.pull_requests || [];

            let pr = pullRequests.find((item) => item.base?.ref === base) || pullRequests[0];

            if (!pr && context.payload.workflow_run.head_branch === 'nexa-saas') {
              const { data: openPrs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:nexa-saas`,
                base,
              });
              pr = openPrs.find((item) => item.head.sha === context.payload.workflow_run.head_sha) || openPrs[0];
            }

            if (!pr) {
              core.info('Geen open PR naar release/test; auto-merge overgeslagen.');
              return;
            }

            core.setOutput('number', String(pr.number));

      - name: Enable auto-merge
        if: steps.pr.outputs.number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.pr.outputs.number }}
          merge-method: merge
