# Na geslaagde Test and Build op een PR naar release/test: auto-merge inschakelen.
# workflow_run i.p.v. wait-on-check: bij synchronize bestaat check "test" vaak nog niet
# en lewagon/wait-on-check-action stopt direct met "check was never run".
#
# Vereist: dit workflow-bestand staat op de default branch van de repo.

name: Auto-merge naar release/test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_run:
    workflows: ["Test and Build"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Find PR naar release/test
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const { data: pulls } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const pr = pulls.find(
              (p) => p.state === 'open' && p.base.ref === 'release/test' && !p.draft
            );
            if (!pr) {
              core.info(`Geen open, niet-draft PR naar release/test voor ${sha}.`);
              return;
            }
            core.info(`Auto-merge voor PR #${pr.number} (${pr.head.ref} → release/test)`);
            core.setOutput('number', String(pr.number));

      - name: Enable auto-merge
        if: steps.pr.outputs.number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.pr.outputs.number }}
          merge-method: merge
