# Na groene Test and Build op PR naar release/test: direct mergen.
# Deploy TEST (deploy-saas.yml) start daarna via PR-closed + expliciete workflow_dispatch.
#
# Let op: workflow_run luistert alleen op de default branch; daarom pull_request
# + wachten tot check "test" bestaat en klaar is (geen lewagon race).

name: Auto-merge naar release/test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - release/test
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: automerge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Wait for test check and merge PR
        uses: actions/github-script@v7
        with:
          script: |
            async function triggerTestDeploy() {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy-saas.yml',
                  ref: 'release/test',
                });
                core.info('Deploy TEST (Proxmox) gestart via workflow_dispatch op release/test.');
              } catch (error) {
                core.warning(`Deploy TEST kon niet worden gestart: ${error.message}`);
              }
            }

            const pr = context.payload.pull_request;
            const headSha = pr.head.sha;
            const waitMs = 20000;
            const maxWaitMs = 30 * 60 * 1000;
            const started = Date.now();

            core.info(`Wacht op check "test" voor ${headSha} (PR #${pr.number})`);

            while (Date.now() - started < maxWaitMs) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
              });

              const testRuns = data.check_runs.filter((c) => c.name === 'test');
              if (testRuns.length === 0) {
                core.info('Check "test" nog niet gestart, wacht...');
                await new Promise((r) => setTimeout(r, waitMs));
                continue;
              }

              const pending = testRuns.filter((c) => c.status !== 'completed');
              if (pending.length > 0) {
                core.info(`Check "test" nog bezig (${pending.map((c) => c.status).join(', ')})`);
                await new Promise((r) => setTimeout(r, waitMs));
                continue;
              }

              const failed = testRuns.filter((c) => c.conclusion !== 'success');
              if (failed.length > 0) {
                core.setFailed(`Check "test" niet geslaagd: ${failed.map((c) => c.conclusion).join(', ')}`);
                return;
              }

              core.info('Check "test" geslaagd, PR mergen...');
              break;
            }

            if (Date.now() - started >= maxWaitMs) {
              core.setFailed('Timeout: check "test" niet op tijd afgerond');
              return;
            }

            for (let attempt = 1; attempt <= 12; attempt++) {
              const { data: freshPr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              if (freshPr.merged) {
                core.info(`PR #${pr.number} was al gemerged.`);
                await triggerTestDeploy();
                return;
              }

              if (freshPr.mergeable === false) {
                core.setFailed(`PR #${pr.number} heeft merge-conflicts en kan niet automatisch gemerged worden.`);
                return;
              }

              if (freshPr.mergeable === null) {
                core.info(`Mergeability nog onbekend, poging ${attempt}/12...`);
                await new Promise((r) => setTimeout(r, 5000));
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'merge',
                });
                core.info(`PR #${pr.number} gemerged naar ${pr.base.ref}`);
                await triggerTestDeploy();
                return;
              } catch (error) {
                const msg = [error?.message, error?.response?.data?.message].filter(Boolean).join(' ');
                if (/already merged|Nothing to merge|No commits between/i.test(msg)) {
                  core.info(`Merge overgeslagen: ${msg}`);
                  await triggerTestDeploy();
                  return;
                }
                if (/merge already in progress/i.test(msg) && attempt < 12) {
                  core.info(`Merge al bezig door andere job, wacht (poging ${attempt}/12)...`);
                  await new Promise((r) => setTimeout(r, 10000));
                  continue;
                }
                if (/Base branch was modified|Head branch was modified|not clean|mergeable/i.test(msg) && attempt < 12) {
                  core.info(`Merge nog niet mogelijk (${msg}), poging ${attempt}/12...`);
                  await new Promise((r) => setTimeout(r, 5000));
                  continue;
                }
                throw error;
              }
            }

            core.setFailed(`PR #${pr.number} kon niet automatisch gemerged worden na meerdere pogingen.`);
